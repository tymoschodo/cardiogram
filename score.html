<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Score</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace}

canvas{display:block;width:100%;height:100%;position:fixed;inset:0}

#hud{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;align-items:center;gap:0.75rem;
  padding:8px 16px;background:rgba(0,0,0,0.9);
  border-top:1px solid rgba(255,255,255,0.06);z-index:10
}
.hud-bpm{font-size:0.68rem;color:rgba(255,255,255,0.3);letter-spacing:0.1em}
.hud-bpm span{color:rgba(255,255,255,0.7)}
.hud-btn{
  background:transparent;border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.3);font-family:'Courier New',monospace;
  font-size:0.62rem;letter-spacing:0.08em;padding:0.3rem 0.65rem;
  cursor:pointer;border-radius:3px;transition:all 0.15s;text-decoration:none;
  display:inline-flex;align-items:center
}
.hud-btn:hover{border-color:rgba(255,255,255,0.35);color:rgba(255,255,255,0.7)}
.hud-spacer{flex:1}
.hud-pos{font-size:0.65rem;color:rgba(255,255,255,0.2);letter-spacing:0.05em}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-bpm">BPM <span id="hud-bpm">72</span></div>
  <button class="hud-btn" id="play-btn" onclick="togglePlay()">▶ PLAY</button>
  <button class="hud-btn" onclick="resetScroll()">⟵ RESET</button>
  <div class="hud-spacer"></div>
  <div class="hud-pos" id="hud-pos">BAR 1</div>
  <a class="hud-btn" href="settings.html">SETTINGS</a>
  <a class="hud-btn" href="index.html">MONITOR</a>
  <button class="hud-btn" onclick="toggleFS()">⛶</button>
</div>

// ── Parse MXL ──
async function unzipMXL(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  // Use JSZip loaded from CDN
  return bytes;
}

// ── MusicXML Parser ──
function parseMusicXML(xmlStr) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'application/xml');
  const notes = [];
  let divisions = 1;
  let currentTick = 0;
  const measureStartTicks = [];
  let beatsPerMeasure = 4, beatType = 4;

  const part = doc.querySelector('part');
  if (!part) throw new Error('No part');

  part.querySelectorAll('measure').forEach((measure, mi) => {
    measureStartTicks.push(currentTick);
    const divEl = measure.querySelector('divisions');
    if (divEl) divisions = parseInt(divEl.textContent)||1;
    const bEl = measure.querySelector('beats');
    const btEl = measure.querySelector('beat-type');
    if (bEl) beatsPerMeasure = parseInt(bEl.textContent)||4;
    if (btEl) beatType = parseInt(btEl.textContent)||4;

    let mTick = currentTick;
    measure.querySelectorAll('note').forEach(n => {
      const dur = parseInt(n.querySelector('duration')?.textContent||'0');
      const isChord = !!n.querySelector('chord');
      const isRest = !!n.querySelector('rest');
      const isGrace = !!n.querySelector('grace');
      const stemDir = n.querySelector('stem')?.textContent||'up';
      const noteType = n.querySelector('type')?.textContent||'quarter';

      const tick = isChord
        ? (notes.length>0 ? notes[notes.length-1].tick : mTick)
        : mTick;

      if (!isRest && !isGrace) {
        const p = n.querySelector('pitch');
        if (p) {
          const step = p.querySelector('step')?.textContent||'C';
          const octave = parseInt(p.querySelector('octave')?.textContent||'4');
          const alter = parseFloat(p.querySelector('alter')?.textContent||'0');
          const midi = stepToMidi(step,octave,alter);
          notes.push({tick, dur, midi, step, octave, alter, stemDir, noteType, isChord, measure:mi+1});
        }
      }
      if (!isChord && !isGrace) mTick += dur;
    });

    const measDur = (beatsPerMeasure * divisions * 4) / beatType;
    currentTick += measDur;
  });

  return {notes, divisions, measureStartTicks, totalTicks:currentTick, beatsPerMeasure, beatType};
}

function stepToMidi(step,octave,alter){
  const s={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
  return (octave+1)*12+(s[step]||0)+Math.round(alter);
}

// ── Renderer ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const LS = 16;           // line spacing px
const HEAD_RX = LS*0.52;
const HEAD_RY = LS*0.38;
const STEM_H  = LS*3.5;
const PX_PER_QUARTER = 100; // px per quarter note

// Middle line = B4 (midi 71), 3rd line from top
const MID_MIDI = 71;

let scoreData = null;
let scrollX = 0;
let playing = false;
let lastTs = null;

function getBPM(){return Math.min(220,Math.max(20,parseInt(localStorage.getItem('pulse_bpm')||'72')));}
function getSpeed(){return (getBPM()/60)*PX_PER_QUARTER;}

function resize(){
  canvas.width  = canvas.offsetWidth*devicePixelRatio;
  canvas.height = canvas.offsetHeight*devicePixelRatio;
}
window.addEventListener('resize',resize);
resize();

function draw(ts){
  if(lastTs!==null && playing){
    const dt=Math.min(ts-lastTs,50);
    scrollX += getSpeed()*(dt/1000);
  }
  lastTs=ts;

  const W=canvas.offsetWidth, H=canvas.offsetHeight;
  const dpr=devicePixelRatio;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  if(!scoreData){requestAnimationFrame(draw);return;}

  const {notes,divisions,measureStartTicks} = scoreData;
  const pxPerTick = PX_PER_QUARTER/divisions;

  // Staff — vertically centered, shifted slightly above center to leave ledger room below
  const staffTop = H*0.5 - LS*3.5;
  const staffBot = staffTop + LS*4;
  const midLineY = staffTop + LS*2; // 3rd line (0-indexed from top)
  const cursorX  = W*0.18;

  // ── Staff lines ──
  ctx.strokeStyle='rgba(255,255,255,0.5)';
  ctx.lineWidth=1;
  for(let i=0;i<5;i++){
    const y=staffTop+i*LS;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }

  // ── Cursor ──
  ctx.strokeStyle='rgba(255,30,60,0.5)';
  ctx.lineWidth=1.5;
  ctx.setLineDash([3,5]);
  ctx.beginPath();ctx.moveTo(cursorX,staffTop-LS*4);ctx.lineTo(cursorX,staffBot+LS*3);ctx.stroke();
  ctx.setLineDash([]);

  // ── Barlines + bar numbers ──
  const curTick = scrollX/pxPerTick;
  let currentBar=1;
  measureStartTicks.forEach((tick,i)=>{
    const x=cursorX+(tick*pxPerTick)-scrollX;
    if(x<-2||x>W+2) return;
    ctx.strokeStyle='rgba(255,255,255,0.25)';
    ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,staffTop);ctx.lineTo(x,staffBot);ctx.stroke();
    if(x>30&&x<W-10){
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.font=`10px Courier New`;
      ctx.textAlign='center';
      ctx.fillText(i+1,x,staffTop-10);
    }
    if(tick<=curTick) currentBar=i+1;
  });

  document.getElementById('hud-pos').textContent=`BAR ${currentBar} / ${measureStartTicks.length}`;
  document.getElementById('hud-bpm').textContent=getBPM();

  // ── Notes ──
  notes.forEach(note=>{
    const x=cursorX+(note.tick*pxPerTick)-scrollX;
    if(x<-80||x>W+80) return;

    // semitone distance from middle line midi (B4)
    const semi = MID_MIDI - note.midi;
    // each step = half line spacing (semitone), but we use diatonic steps for visual:
    // Actually use chromatic mapping: y per semitone = LS/2
    const y = midLineY + semi*(LS/2);

    const isPast = x < cursorX;
    const col = isPast ? 'rgba(255,255,255,0.2)' : '#fff';
    ctx.strokeStyle=col;
    ctx.fillStyle=col;

    // ── Ledger lines ──
    // above top staff line (staffTop)
    for(let ly=staffTop-LS; ly>=y-1; ly-=LS){
      if(Math.abs(ly-y)<LS*0.55){
        ctx.lineWidth=1.2;
        ctx.beginPath();ctx.moveTo(x-HEAD_RX*1.8,ly);ctx.lineTo(x+HEAD_RX*1.8,ly);ctx.stroke();
      }
    }
    // below bottom staff line (staffBot)
    for(let ly=staffBot+LS; ly<=y+1; ly+=LS){
      if(Math.abs(ly-y)<LS*0.55){
        ctx.lineWidth=1.2;
        ctx.beginPath();ctx.moveTo(x-HEAD_RX*1.8,ly);ctx.lineTo(x+HEAD_RX*1.8,ly);ctx.stroke();
      }
    }
    // middle ledger (C4) if needed
    const c4y = midLineY + (MID_MIDI-60)*(LS/2);
    if(Math.abs(y-c4y)<2 && (c4y<staffTop-1||c4y>staffBot+1)){
      ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(x-HEAD_RX*1.8,c4y);ctx.lineTo(x+HEAD_RX*1.8,c4y);ctx.stroke();
    }

    // ── Note head ──
    ctx.beginPath();
    ctx.ellipse(x,y,HEAD_RX,HEAD_RY,-0.15,0,Math.PI*2);
    ctx.fill();

    // ── Stem ──
    const stemUp = note.stemDir==='up';
    ctx.lineWidth=1.3;
    ctx.beginPath();
    if(stemUp){
      ctx.moveTo(x+HEAD_RX*0.85,y-HEAD_RY*0.3);
      ctx.lineTo(x+HEAD_RX*0.85,y-STEM_H);
    } else {
      ctx.moveTo(x-HEAD_RX*0.85,y+HEAD_RY*0.3);
      ctx.lineTo(x-HEAD_RX*0.85,y+STEM_H);
    }
    ctx.stroke();

    // ── Flags / beams (eighth note = 1 flag) ──
    if(note.noteType==='eighth'){
      const sx = stemUp ? x+HEAD_RX*0.85 : x-HEAD_RX*0.85;
      const sy = stemUp ? y-STEM_H : y+STEM_H;
      ctx.lineWidth=1.3;
      ctx.beginPath();
      if(stemUp){
        ctx.moveTo(sx,sy);
        ctx.bezierCurveTo(sx+LS*1.2,sy+LS*0.6, sx+LS*1.0,sy+LS*1.4, sx+LS*0.2,sy+LS*1.8);
      } else {
        ctx.moveTo(sx,sy);
        ctx.bezierCurveTo(sx-LS*1.2,sy-LS*0.6, sx-LS*1.0,sy-LS*1.4, sx-LS*0.2,sy-LS*1.8);
      }
      ctx.stroke();
    }
    if(note.noteType==='16th'){
      const sx = stemUp ? x+HEAD_RX*0.85 : x-HEAD_RX*0.85;
      const sy = stemUp ? y-STEM_H : y+STEM_H;
      ctx.lineWidth=1.3;
      for(let fi=0;fi<2;fi++){
        const off=fi*LS*0.7;
        ctx.beginPath();
        if(stemUp){
          ctx.moveTo(sx,sy+off);
          ctx.bezierCurveTo(sx+LS*1.2,sy+off+LS*0.6, sx+LS*1.0,sy+off+LS*1.4, sx+LS*0.2,sy+off+LS*1.8);
        } else {
          ctx.moveTo(sx,sy-off);
          ctx.bezierCurveTo(sx-LS*1.2,sy-off-LS*0.6, sx-LS*1.0,sy-off-LS*1.4, sx-LS*0.2,sy-off-LS*1.8);
        }
        ctx.stroke();
      }
    }

    // ── Accidental ──
    if(note.alter!==0){
      ctx.fillStyle=isPast?'rgba(255,255,255,0.18)':'rgba(255,255,255,0.9)';
      ctx.font=`${LS*1.5}px serif`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(note.alter>0?'♯':'♭', x-HEAD_RX*2.6, y);
    }
  });

  // ── Treble clef ──
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.font=`${LS*7}px serif`;
  ctx.textAlign='left';
  ctx.textBaseline='alphabetic';
  ctx.fillText('𝄞', 6, staffTop+LS*5.1);

  requestAnimationFrame(draw);
}

// ── Controls ──
function togglePlay(){
  playing=!playing; lastTs=null;
  document.getElementById('play-btn').textContent=playing?'⏸ PAUSE':'▶ PLAY';
}
function resetScroll(){
  scrollX=0;playing=false;lastTs=null;
  document.getElementById('play-btn').textContent='▶ PLAY';
}
function toggleFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();
  else document.exitFullscreen&&document.exitFullscreen();
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='KeyR') resetScroll();
  if(e.code==='KeyF') toggleFS();
});

// ── Load embedded MXL on startup ──
async function loadEmbeddedMXL(){
  // Dynamically load JSZip from CDN
  await new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });

  const bin=atob(MXL_B64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);

  const zip=await JSZip.loadAsync(bytes);

  // find .xml file (not META-INF)
  let xmlFile=null;
  zip.forEach((path,file)=>{
    if(path.endsWith('.xml')&&!path.startsWith('META')) xmlFile=file;
  });
  if(!xmlFile) throw new Error('No XML in MXL');

  const xmlStr=await xmlFile.async('string');
  scoreData=parseMusicXML(xmlStr);
  console.log('Loaded score:', scoreData.notes.length, 'notes,', scoreData.measureStartTicks.length, 'measures');

  // Auto-start if launched from settings
  if(localStorage.getItem('score_autostart')==='1'){
    localStorage.removeItem('score_autostart');
    playing=true;
    document.getElementById('play-btn').textContent='⏸ PAUSE';
  }
}

// Also support drag-drop of new MXL files
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',async e=>{
  e.preventDefault();
  const file=e.dataTransfer.files[0];
  if(!file) return;
  const buf=await file.arrayBuffer();
  const bytes=new Uint8Array(buf);
  let xmlStr;
  if(file.name.endsWith('.mxl')){
    await new Promise((res,rej)=>{
      if(window.JSZip){res();return;}
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      s.onload=res;s.onerror=rej;document.head.appendChild(s);
    });
    const zip=await JSZip.loadAsync(bytes);
    let xmlFile=null;
    zip.forEach((path,file)=>{if(path.endsWith('.xml')&&!path.startsWith('META')) xmlFile=file;});
    xmlStr=await xmlFile.async('string');
  } else {
    xmlStr=new TextDecoder().decode(bytes);
  }
  scoreData=parseMusicXML(xmlStr);
  resetScroll();
});

requestAnimationFrame(draw);
loadEmbeddedMXL();
</script>
