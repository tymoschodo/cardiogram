// ═══════════════════════════════════════
// PARSER
// ═══════════════════════════════════════
function parseMXML(xmlStr) {
  const doc = new DOMParser().parseFromString(xmlStr, 'application/xml');
  const part = doc.querySelector('part');
  if (!part) throw new Error('No <part>');

  let divisions = 1;
  let timeSig = {beats:4, beatType:4};
  let globalTick = 0;

  const notes    = [];  // note objects
  const measures = [];  // {startTick, endTick, timeSig}
  const tuplets  = [];  // {label, noteIndices[]}
  const beams    = [];  // {noteIndices[], level} — each begin→end segment is one beam

  const activeTuplets = {}; // bracket# → {actual,normal,noteIndices,showNum}
  // active beams per beam-number: beam-number → noteIndices[]
  const activeBeams = {};

  part.querySelectorAll('measure').forEach((m, mi) => {
    const divEl = m.querySelector('divisions');
    if (divEl) divisions = parseInt(divEl.textContent)||1;
    const bEl  = m.querySelector('beats');
    const btEl = m.querySelector('beat-type');
    if (bEl)  timeSig = {beats:parseInt(bEl.textContent)||4, beatType:parseInt(btEl.textContent)||4};

    const startTick = globalTick;
    let mTick = globalTick;

    m.querySelectorAll('note').forEach(n => {
      const dur     = parseInt(n.querySelector('duration')?.textContent||'0');
      const isChord = !!n.querySelector('chord');
      const isRest  = !!n.querySelector('rest');
      const isGrace = !!n.querySelector('grace');
      const stemUp  = (n.querySelector('stem')?.textContent||'up') !== 'down';
      const noteType= n.querySelector('type')?.textContent||'quarter';

      // tuplet bookkeeping
      const tm = n.querySelector('time-modification');
      if (tm) {
        const actual = parseInt(tm.querySelector('actual-notes')?.textContent||'1');
        const normal = parseInt(tm.querySelector('normal-notes')?.textContent||'1');
        n.querySelectorAll('tuplet').forEach(tel => {
          const ttype = tel.getAttribute('type');
          const tnum  = tel.getAttribute('number')||'1';
          if (ttype==='start') activeTuplets[tnum]={actual,normal,noteIndices:[],showNum:tel.getAttribute('show-number')};
        });
      }

      const noteTick = isChord
        ? (notes.length>0 ? notes[notes.length-1].tick : mTick)
        : mTick;

      let noteIdx = -1;
      if (!isRest && !isGrace) {
        const p = n.querySelector('pitch');
        if (p) {
          const step  = p.querySelector('step')?.textContent||'C';
          const oct   = parseInt(p.querySelector('octave')?.textContent||'4');
          const alter = parseFloat(p.querySelector('alter')?.textContent||'0');
          noteIdx = notes.length;
          notes.push({
            tick:noteTick, dur, midi:stepMidi(step,oct,alter),
            alter, stemUp, noteType, measureIdx:mi,
            // beam group index assigned later: -1 = no beam
            beamGroup: null
          });
        }
      }

      // register in active tuplets
      if (tm && noteIdx>=0) Object.values(activeTuplets).forEach(tg=>tg.noteIndices.push(noteIdx));

      // process beam elements — each beam number tracks independently
      // beam number 1 = primary beam, 2 = secondary (16th), 3 = tertiary (32nd)
      n.querySelectorAll('beam').forEach(bel => {
        const bnum = bel.getAttribute('number')||'1';
        const bval = bel.textContent; // begin | continue | end | forward hook | backward hook

        if (bval==='begin') {
          activeBeams[bnum] = {noteIndices: noteIdx>=0?[noteIdx]:[], level:parseInt(bnum)};
        } else if ((bval==='continue'||bval==='forward hook'||bval==='backward hook') && activeBeams[bnum]) {
          if (noteIdx>=0) activeBeams[bnum].noteIndices.push(noteIdx);
        } else if (bval==='end' && activeBeams[bnum]) {
          if (noteIdx>=0) activeBeams[bnum].noteIndices.push(noteIdx);
          const bg = activeBeams[bnum];
          if (bg.noteIndices.length>=2) {
            const beamIdx = beams.length;
            beams.push({noteIndices:[...bg.noteIndices], level:bg.level});
            // mark notes with their primary beam group (level 1 only)
            if (bg.level===1) {
              bg.noteIndices.forEach(ni => { notes[ni].beamGroup = beamIdx; });
            }
          }
          delete activeBeams[bnum];
        }
      });

      // close tuplets on stop
      if (tm) {
        n.querySelectorAll('tuplet').forEach(tel => {
          const ttype=tel.getAttribute('type');
          const tnum=tel.getAttribute('number')||'1';
          if (ttype==='stop'&&activeTuplets[tnum]) {
            const tg=activeTuplets[tnum];
            if (tg.noteIndices.length>0) {
              const label=tg.showNum==='none'?'':`${tg.actual}:${tg.normal}`;
              tuplets.push({label, noteIndices:tg.noteIndices});
            }
            delete activeTuplets[tnum];
          }
        });
      }

      if (!isChord&&!isGrace) mTick+=dur;
    });

    const measDur = Math.round(timeSig.beats*divisions*4/timeSig.beatType);
    globalTick = startTick+measDur;
    measures.push({startTick, endTick:globalTick, timeSig:{...timeSig}});
  });

  return {notes, measures, tuplets, beams, divisions, totalTicks:globalTick};
}

function stepMidi(step,oct,alter){
  return (oct+1)*12+{C:0,D:2,E:4,F:5,G:7,A:9,B:11}[step]+Math.round(alter);
}

const DIAT=[0,0,1,1,2,3,3,4,4,5,5,6];
function midiToY(midi,midLineY,LS){
  const refDiat=4*7+6; // B4
  const oct=Math.floor(midi/12)-1;
  const diat=oct*7+DIAT[midi%12];
  return midLineY+(refDiat-diat)*(LS/2);
}

// ═══════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

const LS    = 18;
const HR_X  = LS*0.52;
const HR_Y  = LS*0.37;
const STEM  = LS*3.5;
const BW    = LS*0.52;  // beam bar thickness
const BGAP  = LS*0.72;  // gap between beam levels
const PX_Q  = 110;      // px per quarter note

let data=null, scrollX=0, playing=false, lastTs=null;

function getBPM(){return Math.min(220,Math.max(20,parseInt(localStorage.getItem('pulse_bpm')||'72')));}
function getSpeed(){return (getBPM()/60)*PX_Q;}

function resize(){
  canvas.width=canvas.offsetWidth*devicePixelRatio;
  canvas.height=canvas.offsetHeight*devicePixelRatio;
}
window.addEventListener('resize',resize);
resize();

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// Compute beam Y: normalize all stems in a group to the same height
// = tip of the note that needs the longest stem (furthest from beam side)
function beamY(group,notes,midLineY){
  const stemUp=notes[group.noteIndices[0]]?.stemUp??true;
  let extreme = stemUp ? Infinity : -Infinity;
  group.noteIndices.forEach(ni=>{
    const n=notes[ni]; if(!n) return;
    const y=midiToY(n.midi,midLineY,LS);
    const tipY=stemUp ? y-STEM : y+STEM;
    if(stemUp&&tipY<extreme) extreme=tipY;
    if(!stemUp&&tipY>extreme) extreme=tipY;
  });
  return extreme;
}

function draw(ts){
  if(lastTs!==null&&playing){
    const dt=Math.min(ts-lastTs,50);
    scrollX+=getSpeed()*(dt/1000);
  }
  lastTs=ts;

  const W=canvas.offsetWidth,H=canvas.offsetHeight;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  if(!data){requestAnimationFrame(draw);return;}

  const {notes,measures,tuplets,beams,divisions}=data;
  const pxPerTick=PX_Q/divisions;
  const cursorX=Math.round(W*0.18);

  // Staff geometry
  const staffTop=Math.round(H*0.38-LS*3);
  const staffBot=staffTop+LS*4;
  const midLineY=staffTop+LS*2; // B4 sits on this line

  // ── Staff lines ──
  ctx.strokeStyle='rgba(255,255,255,0.6)';
  ctx.lineWidth=1;
  for(let i=0;i<5;i++){
    const y=staffTop+i*LS;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }

  // ── Cursor ──
  ctx.strokeStyle='rgba(255,30,60,0.4)';
  ctx.lineWidth=1.5;
  ctx.setLineDash([3,6]);
  ctx.beginPath();ctx.moveTo(cursorX,staffTop-LS*5);ctx.lineTo(cursorX,staffBot+LS*2);ctx.stroke();
  ctx.setLineDash([]);

  // ── Barlines + time signatures ──
  const curTick=scrollX/pxPerTick;
  let currentBar=1, prevTS=null;

  measures.forEach((ms,i)=>{
    const x=Math.round(cursorX+ms.startTick*pxPerTick-scrollX);
    if(ms.startTick<=curTick) currentBar=i+1;
    if(x<-4||x>W+4){prevTS=ms.timeSig;return;}

    ctx.strokeStyle='rgba(255,255,255,0.5)';
    ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x,staffTop);ctx.lineTo(x,staffBot);ctx.stroke();

    const ts=ms.timeSig;
    const changed=!prevTS||ts.beats!==prevTS.beats||ts.beatType!==prevTS.beatType;
    if(changed){
      const sz=LS*1.2;
      const cx=x+sz*0.5+6;
      // dark pill behind numbers
      const pw=sz+12, ph=sz*2+8;
      const px=cx-pw/2, py=staffTop-ph-4;
      ctx.fillStyle='rgba(0,0,0,0.8)';
      roundRect(ctx,px,py,pw,ph,4);
      ctx.fill();
      // numbers
      ctx.fillStyle='rgba(255,255,255,0.92)';
      ctx.font=`bold ${sz}px serif`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(ts.beats,    cx, staffTop-sz*1.1-4);
      ctx.fillText(ts.beatType, cx, staffTop-sz*0.1-4);
    }
    prevTS=ts;
  });

  document.getElementById('hbar').textContent=currentBar;
  document.getElementById('htot').textContent=measures.length;
  document.getElementById('hbpm').textContent=getBPM();

  // ── Tuplet brackets ──
  tuplets.forEach(tg=>{
    const {label,noteIndices}=tg;
    if(noteIndices.length<2) return;
    const first=notes[noteIndices[0]];
    const last =notes[noteIndices[noteIndices.length-1]];
    if(!first||!last) return;

    const x1=cursorX+first.tick*pxPerTick-scrollX;
    const x2=cursorX+(last.tick+last.dur)*pxPerTick-scrollX;
    if(x2<0||x1>W) return;

    const stemUp=first.stemUp;
    // find extreme stem tip across all notes in tuplet
    let bY=stemUp?staffTop-LS*1.5:staffBot+LS*1.5;
    noteIndices.forEach(ni=>{
      const n=notes[ni];if(!n)return;
      const ny=midiToY(n.midi,midLineY,LS);
      const tip=stemUp?ny-STEM:ny+STEM;
      if(stemUp&&tip<bY) bY=tip;
      if(!stemUp&&tip>bY) bY=tip;
    });
    bY+=stemUp?-12:12;

    const midX=(x1+x2)/2;
    const legH=7;
    ctx.strokeStyle='rgba(255,255,255,0.6)';
    ctx.lineWidth=1;

    // legs
    ctx.beginPath();ctx.moveTo(x1,bY+(stemUp?legH:-legH));ctx.lineTo(x1,bY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x2,bY+(stemUp?legH:-legH));ctx.lineTo(x2,bY);ctx.stroke();

    if(label){
      ctx.font='11px Courier New';
      const tw=ctx.measureText(label).width+8;
      ctx.beginPath();ctx.moveTo(x1,bY);ctx.lineTo(midX-tw/2,bY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(midX+tw/2,bY);ctx.lineTo(x2,bY);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.textAlign='center';
      ctx.textBaseline=stemUp?'bottom':'top';
      ctx.fillText(label,midX,bY+(stemUp?-2:2));
    } else {
      ctx.beginPath();ctx.moveTo(x1,bY);ctx.lineTo(x2,bY);ctx.stroke();
    }
  });

  // ── Beams — draw each beam segment separately ──
  // Group beams by their level-1 group first to compute shared stem tip
  // level-1 beams define the stem height; level-2+ beams are offset from there

  // Build a map: primary beam index → beamY
  const beamYMap = {};
  beams.forEach((bg,bi)=>{
    if(bg.level===1){
      const valid=bg.noteIndices.filter(ni=>notes[ni]);
      if(valid.length<2) return;
      beamYMap[bi]=beamY(bg,notes,midLineY);
    }
  });

  // For level>1 beams, find their owning level-1 beam by note membership
  // Build note→primary beam map
  const noteToPrimaryBeam={};
  beams.forEach((bg,bi)=>{
    if(bg.level===1) bg.noteIndices.forEach(ni=>{ noteToPrimaryBeam[ni]=bi; });
  });

  beams.forEach((bg,bi)=>{
    if(bg.noteIndices.length<2) return;
    const first=notes[bg.noteIndices[0]];
    if(!first) return;
    const stemUp=first.stemUp;

    // determine beam Y for this level
    let bY;
    if(bg.level===1){
      bY=beamYMap[bi];
    } else {
      // find primary beam for this group's first note
      const primaryIdx=noteToPrimaryBeam[bg.noteIndices[0]];
      const primaryY=primaryIdx!==undefined?beamYMap[primaryIdx]:null;
      if(primaryY===null) return;
      const offset=(bg.level-1)*(BW+BGAP);
      bY=stemUp?primaryY+offset:primaryY-offset;
    }
    if(bY===undefined) return;

    // x coords: use stem x (side of notehead), not center
    const n0=notes[bg.noteIndices[0]];
    const nL=notes[bg.noteIndices[bg.noteIndices.length-1]];
    if(!n0||!nL) return;
    const stemOff = stemUp ? HR_X*0.85 : -HR_X*0.85;
    const x1=cursorX+n0.tick*pxPerTick-scrollX+stemOff;
    const x2=cursorX+nL.tick*pxPerTick-scrollX+stemOff;
    if(x2<-80||x1>W+80) return;

    // draw filled beam rectangle
    ctx.fillStyle='#fff';
    const by=stemUp?bY:bY-BW;
    ctx.fillRect(x1,by,x2-x1,BW);

    // draw stems for notes in this primary beam group only (once, at level 1)
    if(bg.level===1){
      bg.noteIndices.forEach(ni=>{
        const n=notes[ni];if(!n)return;
        const nx=cursorX+n.tick*pxPerTick-scrollX;
        if(nx<-80||nx>W+80) return;
        const ny=midiToY(n.midi,midLineY,LS);
        const sx=stemUp?nx+HR_X*0.85:nx-HR_X*0.85;
        const sy0=stemUp?ny-HR_Y*0.4:ny+HR_Y*0.4;
        ctx.strokeStyle='#fff';
        ctx.lineWidth=1.5;
        // extend stem slightly into beam bar so no gap
        const sy1 = stemUp ? bY+BW*0.5 : bY-BW*0.5;
        ctx.beginPath();ctx.moveTo(sx,sy0);ctx.lineTo(sx,sy1);ctx.stroke();
      });
    }
  });

  // ── Note heads, ledger lines, accidentals, unbeamed stems/flags ──
  notes.forEach(note=>{
    const x=cursorX+note.tick*pxPerTick-scrollX;
    if(x<-80||x>W+80) return;
    const y=midiToY(note.midi,midLineY,LS);

    // ledger lines above staff — draw every line between staffTop and note
    for(let ly=staffTop-LS; ly>=y-LS*0.6; ly-=LS){
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(x-HR_X*2.1,ly); ctx.lineTo(x+HR_X*2.1,ly); ctx.stroke();
    }
    // ledger lines below staff — draw every line between staffBot and note
    for(let ly=staffBot+LS; ly<=y+LS*0.6; ly+=LS){
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(x-HR_X*2.1,ly); ctx.lineTo(x+HR_X*2.1,ly); ctx.stroke();
    }

    // note head
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.ellipse(x,y,HR_X,HR_Y,-0.15,0,Math.PI*2);
    ctx.fill();

    // unbeamed: draw stem + flags
    if(note.beamGroup===null){
      const sx=note.stemUp?x+HR_X*0.85:x-HR_X*0.85;
      const sy0=note.stemUp?y-HR_Y*0.4:y+HR_Y*0.4;
      const sy1=note.stemUp?y-STEM:y+STEM;
      ctx.strokeStyle='#fff';ctx.lineWidth=1.3;
      ctx.beginPath();ctx.moveTo(sx,sy0);ctx.lineTo(sx,sy1);ctx.stroke();
      const fc={'eighth':1,'16th':2,'32nd':3}[note.noteType]||0;
      for(let fi=0;fi<fc;fi++){
        const fy=note.stemUp?sy1+fi*LS*0.9:sy1-fi*LS*0.9;
        ctx.lineWidth=1.3;
        ctx.beginPath();
        if(note.stemUp){
          ctx.moveTo(sx,fy);
          ctx.bezierCurveTo(sx+LS*1.4,fy+LS*0.5,sx+LS*1.1,fy+LS*1.5,sx+LS*0.15,fy+LS*2.1);
        } else {
          ctx.moveTo(sx,fy);
          ctx.bezierCurveTo(sx-LS*1.4,fy-LS*0.5,sx-LS*1.1,fy-LS*1.5,sx-LS*0.15,fy-LS*2.1);
        }
        ctx.stroke();
      }
    }

    // accidental
    if(note.alter!==0){
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.font=`${LS*1.7}px serif`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(note.alter>0?'\u266F':'\u266D',x-HR_X*2.8,y+1);
    }
  });

  // ── Treble clef ──
  // The treble clef glyph 𝄞: its G-curl wraps around the second line from bottom.
  // In our staff: second line from bottom = line index 3 from top = staffTop + 3*LS
  // The glyph baseline in most fonts: the G curl centre sits at roughly 2/7 of glyph height
  // At font-size F, glyph height ≈ F. The curl centre is about 0.28*F from the bottom of the glyph.
  // So: baseline y = (staffTop + 3*LS) + 0.28*F
  // With F = LS*7.5: offset = LS*7.5 * 0.28 ≈ LS*2.1
  // baseline = staffTop + 3*LS + LS*2.1 = staffTop + LS*5.1
  // But the glyph also extends below the baseline — the curl tail goes below.
  // Emperically tuned: baseline = staffTop + LS * 5.1 puts curl on line 3-from-top.
  // Treble clef — drawn at score position (scrolls away at start)
  const clefSize = LS * 7.5;
  const G4line = staffTop + 3*LS;
  const clefX = cursorX - scrollX - clefSize*0.1;
  if(clefX > -clefSize && clefX < W) {
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font=`${clefSize}px serif`;
    ctx.textAlign='left';
    ctx.textBaseline='alphabetic';
    ctx.fillText('\uD834\uDD1E', clefX, G4line + clefSize * 0.35 - LS);
  }

  requestAnimationFrame(draw);
}

// ── Controls ──
function togglePlay(){
  playing=!playing;lastTs=null;
  document.getElementById('pbtn').innerHTML=playing?'&#9646;&#9646; PAUSE':'&#9654; PLAY';
}
function reset(){
  scrollX=0;playing=false;lastTs=null;
  document.getElementById('pbtn').innerHTML='&#9654; PLAY';
}
function toggleFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='KeyR') reset();
  if(e.code==='KeyF') toggleFS();
});

// ── Load MXL / XML ──
async function loadMXL(bytes){
  const zip=await JSZip.loadAsync(bytes);
  let xmlFile=null;
  zip.forEach((path,f)=>{if(path.endsWith('.xml')&&!path.startsWith('META')) xmlFile=f;});
  if(!xmlFile) throw new Error('No XML in archive');
  return parseMXML(await xmlFile.async('string'));
}

async function init(){
  await new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });

  const bin=atob(MXL_B64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  data=await loadMXL(bytes);
  document.getElementById('loading').style.display='none';

  if(localStorage.getItem('score_autostart')==='1'){
    localStorage.removeItem('score_autostart');
    playing=true;
    document.getElementById('pbtn').innerHTML='&#9646;&#9646; PAUSE';
  }
}

document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',async e=>{
  e.preventDefault();
  const file=e.dataTransfer.files[0];if(!file)return;
  const buf=await file.arrayBuffer();
  data=file.name.toLowerCase().endsWith('.mxl')
    ?await loadMXL(new Uint8Array(buf))
    :parseMXML(new TextDecoder().decode(buf));
  reset();
  document.getElementById('loading').style.display='none';
});

requestAnimationFrame(draw);
init();
</script>
