<!DOCTYPE html>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Score</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace}
canvas{display:block;width:100%;height:100%;position:fixed;inset:0}
#hud{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;align-items:center;gap:0.75rem;
  padding:8px 16px;background:rgba(0,0,0,0.92);
  border-top:1px solid rgba(255,255,255,0.07);z-index:10
}
.hb{font-size:0.68rem;color:rgba(255,255,255,0.3);letter-spacing:0.1em}
.hb span{color:rgba(255,255,255,0.75)}
.btn{
  background:transparent;border:1px solid rgba(255,255,255,0.13);
  color:rgba(255,255,255,0.35);font-family:'Courier New',monospace;
  font-size:0.62rem;letter-spacing:0.08em;padding:0.28rem 0.65rem;
  cursor:pointer;border-radius:3px;transition:all 0.15s;text-decoration:none;
  display:inline-flex;align-items:center
}
.btn:hover{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.8)}
.sp{flex:1}
#loading{
  position:fixed;inset:0;background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0.75rem;
  color:rgba(255,255,255,0.3);font-size:0.75rem;letter-spacing:0.2em;z-index:20
}
#drop-hint{font-size:0.6rem;color:rgba(255,255,255,0.15);letter-spacing:0.15em}
</style>

// ═══════════════════════════════════════════
// PARSER
// ═══════════════════════════════════════════
function parseMXML(xmlStr) {
  const doc = new DOMParser().parseFromString(xmlStr, 'application/xml');
  const part = doc.querySelector('part');
  if (!part) throw new Error('No <part> found');

  let divisions = 1;
  let timeSig = { beats:4, beatType:4 };
  let globalTick = 0;

  const notes    = [];
  const measures = [];
  const tuplets  = [];
  const beamGroups = []; // [{noteIndices}]

  const activeTuplets = {}; // num → {actual,normal,noteIndices,showNum}
  let activeBeam = null;    // {noteIndices}

  part.querySelectorAll('measure').forEach((m, mi) => {
    const divEl = m.querySelector('divisions');
    if (divEl) divisions = parseInt(divEl.textContent)||1;
    const bEl  = m.querySelector('beats');
    const btEl = m.querySelector('beat-type');
    if (bEl)  timeSig = { beats: parseInt(bEl.textContent)||4, beatType: parseInt(btEl.textContent)||4 };

    const startTick = globalTick;
    let mTick = globalTick;

    m.querySelectorAll('note').forEach(n => {
      const dur     = parseInt(n.querySelector('duration')?.textContent||'0');
      const isChord = !!n.querySelector('chord');
      const isRest  = !!n.querySelector('rest');
      const isGrace = !!n.querySelector('grace');
      const stemUp  = (n.querySelector('stem')?.textContent||'up') !== 'down';
      const noteType= n.querySelector('type')?.textContent||'quarter';

      // tuplet tracking
      const tm = n.querySelector('time-modification');
      let actual=1, normal=1;
      if (tm) {
        actual = parseInt(tm.querySelector('actual-notes')?.textContent||'1');
        normal = parseInt(tm.querySelector('normal-notes')?.textContent||'1');
        n.querySelectorAll('tuplet').forEach(tel => {
          const ttype = tel.getAttribute('type');
          const tnum  = tel.getAttribute('number')||'1';
          if (ttype==='start') {
            activeTuplets[tnum] = { actual, normal, noteIndices:[], showNum: tel.getAttribute('show-number') };
          }
        });
      }

      // beam tracking
      const beamEls = [...n.querySelectorAll('beam')];
      const beamBegin = beamEls.some(b => b.getAttribute('number')==='1' && b.textContent==='begin');
      const beamContinue = beamEls.some(b => b.getAttribute('number')==='1' && (b.textContent==='continue'||b.textContent==='end'));
      const beamEnd = beamEls.some(b => b.getAttribute('number')==='1' && b.textContent==='end');

      const noteTick = isChord
        ? (notes.length>0 ? notes[notes.length-1].tick : mTick)
        : mTick;

      let noteIdx = -1;
      if (!isRest && !isGrace) {
        const p = n.querySelector('pitch');
        if (p) {
          const step  = p.querySelector('step')?.textContent||'C';
          const oct   = parseInt(p.querySelector('octave')?.textContent||'4');
          const alter = parseFloat(p.querySelector('alter')?.textContent||'0');
          const midi  = stepMidi(step, oct, alter);
          noteIdx = notes.length;
          notes.push({ tick:noteTick, dur, midi, alter, stemUp, noteType,
                       hasTuplet:!!tm, measureIdx:mi, beamGroupIdx:-1 });
        }
      }

      // register in tuplets
      if (tm && noteIdx>=0) Object.values(activeTuplets).forEach(tg => tg.noteIndices.push(noteIdx));

      // beam groups
      if (noteIdx >= 0) {
        if (beamBegin) {
          activeBeam = { noteIndices:[noteIdx] };
        } else if (beamContinue && activeBeam) {
          activeBeam.noteIndices.push(noteIdx);
        }
        if (beamEnd && activeBeam) {
          activeBeam.noteIndices.push(noteIdx);
          // assign group index to all notes
          const gIdx = beamGroups.length;
          activeBeam.noteIndices.forEach(ni => { notes[ni].beamGroupIdx = gIdx; });
          beamGroups.push({ noteIndices: activeBeam.noteIndices });
          activeBeam = null;
        }
      }

      // close tuplets
      if (tm) {
        n.querySelectorAll('tuplet').forEach(tel => {
          const ttype = tel.getAttribute('type');
          const tnum  = tel.getAttribute('number')||'1';
          if (ttype==='stop' && activeTuplets[tnum]) {
            const tg = activeTuplets[tnum];
            if (tg.noteIndices.length>0) {
              const label = tg.showNum==='none' ? '' : `${tg.actual}:${tg.normal}`;
              tuplets.push({ label, noteIndices: tg.noteIndices });
            }
            delete activeTuplets[tnum];
          }
        });
      }

      if (!isChord && !isGrace) mTick += dur;
    });

    const measDur = Math.round(timeSig.beats * divisions * 4 / timeSig.beatType);
    globalTick = startTick + measDur;
    measures.push({ startTick, endTick:globalTick, timeSig:{...timeSig} });
  });

  return { notes, measures, tuplets, beamGroups, divisions, totalTicks:globalTick };
}

function stepMidi(step, oct, alter) {
  return (oct+1)*12 + {C:0,D:2,E:4,F:5,G:7,A:9,B:11}[step] + Math.round(alter);
}

const DIAT = [0,0,1,1,2,3,3,4,4,5,5,6];
function midiToY(midi, midLineY, LS) {
  const refDiat = 4*7+6; // B4
  const oct  = Math.floor(midi/12)-1;
  const diat = oct*7 + DIAT[midi%12];
  return midLineY + (refDiat - diat)*(LS/2);
}

// ═══════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const LS    = 18;
const HR_X  = LS*0.52;
const HR_Y  = LS*0.37;
const STEM  = LS*3.5;
const BEAM_H = LS*0.55;  // beam bar thickness
const BEAM_GAP = LS*0.7; // gap between beam bars (16th etc)
const PX_Q  = 110;

let data    = null;
let scrollX = 0;
let playing = false;
let lastTs  = null;

function getBPM()   { return Math.min(220,Math.max(20,parseInt(localStorage.getItem('pulse_bpm')||'72'))); }
function getSpeed() { return (getBPM()/60)*PX_Q; }

function resize() {
  canvas.width  = canvas.offsetWidth*devicePixelRatio;
  canvas.height = canvas.offsetHeight*devicePixelRatio;
}
window.addEventListener('resize', resize);
resize();

// Compute a beam group's stem endpoint (all stems normalized to same height)
function beamStemTip(group, notes, midLineY, stemUp) {
  // Find the note furthest from beam (needs longest stem)
  let extremeY = stemUp ? Infinity : -Infinity;
  group.noteIndices.forEach(ni => {
    const n = notes[ni];
    if (!n) return;
    const y = midiToY(n.midi, midLineY, LS);
    if (stemUp && y < extremeY) extremeY = y;
    if (!stemUp && y > extremeY) extremeY = y;
  });
  // Beam y = tip of longest stem
  return stemUp ? extremeY - STEM : extremeY + STEM;
}

function draw(ts) {
  if (lastTs!==null && playing) {
    const dt = Math.min(ts-lastTs, 50);
    scrollX += getSpeed()*(dt/1000);
  }
  lastTs = ts;

  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,W,H);

  if (!data) { requestAnimationFrame(draw); return; }

  const {notes, measures, tuplets, beamGroups, divisions} = data;
  const pxPerTick = PX_Q/divisions;
  const cursorX   = Math.round(W*0.18);
  const staffTop  = Math.round(H*0.5 - LS*3);
  const staffBot  = staffTop + LS*4;
  const midLineY  = staffTop + LS*2; // B4

  // ── Staff lines ──
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1;
  for (let i=0;i<5;i++) {
    const y = staffTop+i*LS;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // ── Cursor ──
  ctx.strokeStyle = 'rgba(255,30,60,0.4)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3,6]);
  ctx.beginPath(); ctx.moveTo(cursorX,staffTop-LS*5); ctx.lineTo(cursorX,staffBot+LS*2); ctx.stroke();
  ctx.setLineDash([]);

  // ── Barlines + time signatures ──
  const curTick = scrollX/pxPerTick;
  let currentBar = 1;
  let prevTS = null;

  measures.forEach((ms,i) => {
    const x = Math.round(cursorX + ms.startTick*pxPerTick - scrollX);
    if (ms.startTick<=curTick) currentBar=i+1;
    if (x<-4||x>W+4) { prevTS=ms.timeSig; return; }

    // barline — full height, bright
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x,staffTop); ctx.lineTo(x,staffBot); ctx.stroke();

    // time sig — stacked, only on change, rendered on a clean dark pill above staff
    const ts = ms.timeSig;
    const changed = !prevTS || ts.beats!==prevTS.beats || ts.beatType!==prevTS.beatType;
    if (changed) {
      const tsSize = LS*1.3;
      const tsX = x + 8;
      const tsY = staffTop - LS*0.6;

      // dark backdrop pill so numbers never clash with notes
      const pillW = tsSize*0.8 + 10;
      const pillH = tsSize*2 + 6;
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      roundRect(ctx, tsX - 5, tsY - tsSize*2 - 3, pillW, pillH, 4);
      ctx.fill();

      // numbers
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = `bold ${tsSize}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const cx = tsX + pillW/2 - 5;
      ctx.fillText(ts.beats,    cx, tsY - tsSize*1.1);
      ctx.fillText(ts.beatType, cx, tsY - tsSize*0.1);
    }
    prevTS = ts;
  });

  document.getElementById('hbar').textContent = currentBar;
  document.getElementById('htot').textContent = measures.length;
  document.getElementById('hbpm').textContent = getBPM();

  // ── Tuplet brackets ──
  tuplets.forEach(tg => {
    const {label, noteIndices} = tg;
    if (noteIndices.length<2) return;
    const first = notes[noteIndices[0]];
    const last  = notes[noteIndices[noteIndices.length-1]];
    if (!first||!last) return;

    const x1 = cursorX + first.tick*pxPerTick - scrollX;
    const x2 = cursorX + (last.tick+last.dur)*pxPerTick - scrollX;
    if (x2<0||x1>W) return;

    const stemUp = first.stemUp;
    let bracketY = stemUp ? staffTop - LS*1.6 : staffBot + LS*1.6;
    // push above/below the highest/lowest stem tip in group
    noteIndices.forEach(ni => {
      const n = notes[ni]; if(!n) return;
      const ny = midiToY(n.midi, midLineY, LS);
      const tip = stemUp ? ny-STEM : ny+STEM;
      if (stemUp && tip < bracketY) bracketY = tip;
      if (!stemUp && tip > bracketY) bracketY = tip;
    });
    bracketY += stemUp ? -10 : 10;

    const midX = (x1+x2)/2;
    const legH = 7;

    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1;

    if (stemUp) {
      ctx.beginPath(); ctx.moveTo(x1,bracketY+legH); ctx.lineTo(x1,bracketY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x2,bracketY+legH); ctx.lineTo(x2,bracketY); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(x1,bracketY-legH); ctx.lineTo(x1,bracketY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x2,bracketY-legH); ctx.lineTo(x2,bracketY); ctx.stroke();
    }

    if (label) {
      ctx.font = '11px Courier New';
      const tw = ctx.measureText(label).width + 8;
      ctx.beginPath(); ctx.moveTo(x1,bracketY); ctx.lineTo(midX-tw/2,bracketY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(midX+tw/2,bracketY); ctx.lineTo(x2,bracketY); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.textAlign = 'center';
      ctx.textBaseline = stemUp ? 'bottom' : 'top';
      ctx.fillText(label, midX, bracketY + (stemUp ? -1 : 1));
    } else {
      ctx.beginPath(); ctx.moveTo(x1,bracketY); ctx.lineTo(x2,bracketY); ctx.stroke();
    }
  });

  // ── Beam groups ──
  beamGroups.forEach(group => {
    if (group.noteIndices.length < 2) return;
    const stemUp = notes[group.noteIndices[0]]?.stemUp ?? true;
    const beamY  = beamStemTip(group, notes, midLineY, stemUp);

    // check any note in range
    const xs = group.noteIndices.map(ni => {
      const n = notes[ni];
      return n ? cursorX + n.tick*pxPerTick - scrollX : null;
    }).filter(x => x!==null);
    if (xs.every(x => x<-80||x>W+80)) return;

    // draw primary beam bar across all notes in group
    const x1 = cursorX + notes[group.noteIndices[0]].tick*pxPerTick - scrollX;
    const lastNote = notes[group.noteIndices[group.noteIndices.length-1]];
    const x2 = cursorX + lastNote.tick*pxPerTick - scrollX;

    ctx.fillStyle = '#fff';
    const by = stemUp ? beamY : beamY - BEAM_H;
    ctx.fillRect(x1, by, x2-x1, BEAM_H);

    // secondary beam bars for 16th notes (each pair)
    group.noteIndices.forEach((ni, gi) => {
      const n = notes[ni];
      if (!n || n.noteType !== '16th') return;
      const nx = cursorX + n.tick*pxPerTick - scrollX;
      const nextNi = group.noteIndices[gi+1];
      const nextN  = nextNi !== undefined ? notes[nextNi] : null;
      const nx2    = nextN ? cursorX + nextN.tick*pxPerTick - scrollX : nx + PX_Q*pxPerTick*0.5;
      const by2    = stemUp ? beamY + BEAM_GAP : beamY - BEAM_H - BEAM_GAP;
      ctx.fillRect(nx, by2, nx2-nx, BEAM_H);
    });

    // draw stems — all to same beam Y
    group.noteIndices.forEach(ni => {
      const n = notes[ni]; if(!n) return;
      const nx = cursorX + n.tick*pxPerTick - scrollX;
      if (nx < -80 || nx > W+80) return;
      const ny = midiToY(n.midi, midLineY, LS);
      const sx = stemUp ? nx+HR_X*0.85 : nx-HR_X*0.85;
      const sy0 = stemUp ? ny-HR_Y*0.4 : ny+HR_Y*0.4;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.moveTo(sx,sy0); ctx.lineTo(sx,beamY); ctx.stroke();
    });
  });

  // ── Notes (heads + accidentals + unbeamed stems/flags) ──
  notes.forEach(note => {
    const x = cursorX + note.tick*pxPerTick - scrollX;
    if (x<-80||x>W+80) return;

    const y = midiToY(note.midi, midLineY, LS);

    // ledger lines above
    for (let ly=staffTop-LS; ly>=y-1; ly-=LS) {
      if (Math.abs(ly-y)<2) {
        ctx.strokeStyle='#fff'; ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.moveTo(x-HR_X*2,ly); ctx.lineTo(x+HR_X*2,ly); ctx.stroke();
      }
    }
    // ledger lines below
    for (let ly=staffBot+LS; ly<=y+1; ly+=LS) {
      if (Math.abs(ly-y)<2) {
        ctx.strokeStyle='#fff'; ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.moveTo(x-HR_X*2,ly); ctx.lineTo(x+HR_X*2,ly); ctx.stroke();
      }
    }

    // note head — always white
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x, y, HR_X, HR_Y, -0.15, 0, Math.PI*2);
    ctx.fill();

    // unbeamed stem + flag
    if (note.beamGroupIdx === -1) {
      const sx  = note.stemUp ? x+HR_X*0.85 : x-HR_X*0.85;
      const sy0 = note.stemUp ? y-HR_Y*0.4  : y+HR_Y*0.4;
      const sy1 = note.stemUp ? y-STEM       : y+STEM;
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.3;
      ctx.beginPath(); ctx.moveTo(sx,sy0); ctx.lineTo(sx,sy1); ctx.stroke();

      const flagCount = {'eighth':1,'16th':2,'32nd':3}[note.noteType]||0;
      for (let fi=0;fi<flagCount;fi++) {
        const fy = note.stemUp ? sy1+fi*LS*0.9 : sy1-fi*LS*0.9;
        ctx.beginPath();
        if (note.stemUp) {
          ctx.moveTo(sx,fy);
          ctx.bezierCurveTo(sx+LS*1.4,fy+LS*0.5,sx+LS*1.1,fy+LS*1.5,sx+LS*0.15,fy+LS*2.1);
        } else {
          ctx.moveTo(sx,fy);
          ctx.bezierCurveTo(sx-LS*1.4,fy-LS*0.5,sx-LS*1.1,fy-LS*1.5,sx-LS*0.15,fy-LS*2.1);
        }
        ctx.stroke();
      }
    }

    // accidental
    if (note.alter!==0) {
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.font=`${LS*1.7}px serif`;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(note.alter>0?'\u266F':'\u266D', x-HR_X*2.8, y+1);
    }
  });

  // ── Treble clef — violin clef anchored to 2nd line from bottom ──
  // In treble clef: G sits on 2nd line from bottom = line index 3 from top (0-based)
  // staffTop + 3*LS = that line. The glyph baseline goes there.
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.font=`${LS*7.5}px serif`;
  ctx.textAlign='left';
  ctx.textBaseline='alphabetic';
  // anchor: bottom of clef curl = line 1 from bottom = staffTop + 3*LS
  ctx.fillText('\uD834\uDD1E', 8, staffTop + LS*5.3);

  requestAnimationFrame(draw);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ── Controls ──
function togglePlay() {
  playing=!playing; lastTs=null;
  document.getElementById('pbtn').innerHTML=playing?'&#9646;&#9646; PAUSE':'&#9654; PLAY';
}
function reset() {
  scrollX=0;playing=false;lastTs=null;
  document.getElementById('pbtn').innerHTML='&#9654; PLAY';
}
function toggleFS() {
  if(!document.fullscreenElement) document.documentElement.requestFullscreen?.();
  else document.exitFullscreen?.();
}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='KeyR') reset();
  if(e.code==='KeyF') toggleFS();
});

// ── Load ──
async function loadMXL(bytes) {
  const zip=await JSZip.loadAsync(bytes);
  let xmlFile=null;
  zip.forEach((path,f)=>{ if(path.endsWith('.xml')&&!path.startsWith('META')) xmlFile=f; });
  if(!xmlFile) throw new Error('No XML in archive');
  return parseMXML(await xmlFile.async('string'));
}

async function init() {
  await new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });

  const bin=atob(MXL_B64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  data=await loadMXL(bytes);
  document.getElementById('loading').style.display='none';

  if(localStorage.getItem('score_autostart')==='1'){
    localStorage.removeItem('score_autostart');
    playing=true;
    document.getElementById('pbtn').innerHTML='&#9646;&#9646; PAUSE';
  }
}

document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',async e=>{
  e.preventDefault();
  const file=e.dataTransfer.files[0]; if(!file) return;
  const buf=await file.arrayBuffer();
  data = file.name.toLowerCase().endsWith('.mxl')
    ? await loadMXL(new Uint8Array(buf))
    : parseMXML(new TextDecoder().decode(buf));
  reset();
  document.getElementById('loading').style.display='none';
});

requestAnimationFrame(draw);
init();
</script>
