<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Score</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Courier New',monospace}

/* ── DROP OVERLAY ── */
#drop-zone{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1.5rem;
  background:#000;z-index:10;transition:background 0.2s
}
#drop-zone.drag-over{background:#0a0a0a}
#drop-zone.hidden{display:none}

.drop-box{
  border:1px solid rgba(255,255,255,0.15);border-radius:12px;
  padding:3rem 4rem;text-align:center;cursor:pointer;
  transition:border-color 0.2s
}
.drop-box:hover,.drag-over .drop-box{border-color:rgba(255,255,255,0.4)}
.drop-icon{font-size:2.5rem;margin-bottom:1rem;opacity:0.4}
.drop-title{font-size:1rem;color:rgba(255,255,255,0.7);letter-spacing:0.05em;margin-bottom:0.4rem}
.drop-sub{font-size:0.7rem;color:rgba(255,255,255,0.25);letter-spacing:0.08em}
#file-input{display:none}

.nav-links{display:flex;gap:1rem}
.nav-link{
  color:rgba(255,255,255,0.2);font-size:0.65rem;letter-spacing:0.15em;
  text-decoration:none;border:1px solid rgba(255,255,255,0.1);
  padding:0.4rem 0.8rem;border-radius:4px;transition:all 0.2s
}
.nav-link:hover{color:rgba(255,255,255,0.6);border-color:rgba(255,255,255,0.3)}

/* ── SCORE VIEW ── */
#score-view{position:fixed;inset:0;display:none;flex-direction:column}
#score-view.visible{display:flex}

canvas#score-canvas{display:block;flex:1;width:100%;background:#000}

/* HUD */
#hud{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;align-items:center;gap:1rem;
  padding:10px 16px;background:rgba(0,0,0,0.85);
  border-top:1px solid rgba(255,255,255,0.06)
}
.hud-bpm{font-size:0.7rem;color:rgba(255,255,255,0.3);letter-spacing:0.1em}
.hud-bpm span{color:rgba(255,255,255,0.7)}
.hud-btn{
  background:transparent;border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.3);font-family:'Courier New',monospace;
  font-size:0.62rem;letter-spacing:0.1em;padding:0.3rem 0.7rem;
  cursor:pointer;border-radius:3px;transition:all 0.15s
}
.hud-btn:hover{border-color:rgba(255,255,255,0.35);color:rgba(255,255,255,0.7)}
.hud-spacer{flex:1}
.hud-pos{font-size:0.65rem;color:rgba(255,255,255,0.2);letter-spacing:0.05em}

/* error */
#err{
  position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  background:#1a0000;border:1px solid rgba(255,50,50,0.3);
  color:rgba(255,100,100,0.8);font-size:0.7rem;padding:0.5rem 1rem;
  border-radius:4px;display:none;letter-spacing:0.05em
}
</style>
</head>
<body>

<!-- DROP SCREEN -->
<div id="drop-zone">
  <div class="drop-box" onclick="document.getElementById('file-input').click()">
    <div class="drop-icon">𝄞</div>
    <div class="drop-title">DROP MUSICXML HERE</div>
    <div class="drop-sub">OR CLICK TO BROWSE · .XML / .MXL / .MUSICXML</div>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="index.html">← MONITOR</a>
    <a class="nav-link" href="settings.html">SETTINGS</a>
  </div>
  <input type="file" id="file-input" accept=".xml,.mxl,.musicxml"/>
</div>

<!-- SCORE VIEW -->
<div id="score-view">
  <canvas id="score-canvas"></canvas>
  <div id="hud">
    <div class="hud-bpm">BPM <span id="hud-bpm-val">72</span></div>
    <button class="hud-btn" id="play-btn" onclick="togglePlay()">▶ PLAY</button>
    <button class="hud-btn" onclick="resetScroll()">⟵ RESET</button>
    <div class="hud-spacer"></div>
    <div class="hud-pos" id="hud-pos">BAR 1</div>
    <button class="hud-btn" onclick="reloadFile()">LOAD NEW</button>
    <a class="hud-btn" href="index.html" style="text-decoration:none">MONITOR</a>
    <button class="hud-btn" onclick="toggleFS()">⛶</button>
  </div>
</div>

<div id="err"></div>

<script>
// ═══════════════════════════════════════════════
// MUSICXML PARSER
// ═══════════════════════════════════════════════

function parseMusicXML(xmlStr) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlStr, 'application/xml');
  if (doc.querySelector('parsererror')) throw new Error('Invalid XML');

  const notes = [];
  let divisions = 1;
  let currentTick = 0;
  let measureNum = 0;
  const measureStartTicks = [];

  // collect parts — use first part only
  const part = doc.querySelector('part');
  if (!part) throw new Error('No part found in MusicXML');

  const measures = part.querySelectorAll('measure');

  measures.forEach(measure => {
    measureNum++;
    measureStartTicks.push(currentTick);

    // update divisions if present
    const divEl = measure.querySelector('divisions');
    if (divEl) divisions = parseInt(divEl.textContent) || 1;

    // time signature
    const beatsEl = measure.querySelector('beats');
    const beatTypeEl = measure.querySelector('beat-type');
    let beatsPerMeasure = beatsEl ? parseInt(beatsEl.textContent) : 4;
    let beatType = beatTypeEl ? parseInt(beatTypeEl.textContent) : 4;

    let measureTick = currentTick;

    // process notes and rests
    measure.querySelectorAll('note').forEach(noteEl => {
      const durationEl = noteEl.querySelector('duration');
      const dur = durationEl ? parseInt(durationEl.textContent) : 0;
      const isChord = !!noteEl.querySelector('chord');
      const isRest = !!noteEl.querySelector('rest');
      const isGrace = !!noteEl.querySelector('grace');

      if (isChord) {
        // chord note: same tick as previous
      } else {
        measureTick = isGrace ? measureTick : measureTick;
      }

      let tick = isChord ? (notes.length > 0 ? notes[notes.length - 1].tick : measureTick) : measureTick;

      if (!isRest) {
        const pitchEl = noteEl.querySelector('pitch');
        if (pitchEl) {
          const step = pitchEl.querySelector('step')?.textContent || 'C';
          const octave = parseInt(pitchEl.querySelector('octave')?.textContent || '4');
          const alter = parseFloat(pitchEl.querySelector('alter')?.textContent || '0');
          const midi = stepOctaveToMidi(step, octave, alter);
          notes.push({ tick, dur, midi, step, octave, alter, measure: measureNum, isChord });
        }
      }

      if (!isChord && !isGrace) measureTick += dur;
    });

    // advance by measure duration
    const measureDurTicks = (beatsPerMeasure * divisions * 4) / beatType;
    currentTick += measureDurTicks;
  });

  return { notes, divisions, measureStartTicks, totalTicks: currentTick };
}

function stepOctaveToMidi(step, octave, alter) {
  const steps = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
  return (octave + 1) * 12 + (steps[step] || 0) + Math.round(alter);
}

// ═══════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════

const canvas = document.getElementById('score-canvas');
const ctx = canvas.getContext('2d');

// Staff params
const STAFF_LINES = 5;
const LINE_SPACING = 14;      // px between staff lines
const STAFF_HEIGHT = LINE_SPACING * (STAFF_LINES - 1); // 56
const STAFF_TOP_PADDING = 60; // space above top line
const HEAD_R = LINE_SPACING * 0.42;
const STEM_H = LINE_SPACING * 3.2;

// The note that sits on the middle (3rd) staff line = B4 (midi 71)
// We use: y = staffTop + (B4_midi - midi) * (LINE_SPACING/2)
// Middle line y = staffTop + 2*LINE_SPACING
const MIDDLE_LINE_MIDI = 71; // B4

let scoreData = null;
let scrollX = 0;        // current scroll in px (increases rightward = notes move left)
let playing = false;
let lastTs = null;
let raf = null;
let ticksPerPx = 1;     // will be computed from BPM
let currentBar = 1;

// pixels per quarter note — set so that at 72 BPM, scrolling feels musical
// We'll compute from BPM: speed = (BPM/60) * px_per_quarter
// px_per_quarter = fixed (e.g. 80px)
const PX_PER_QUARTER = 90; // px per quarter note duration

function getBPM() {
  return Math.min(220, Math.max(20, parseInt(localStorage.getItem('pulse_bpm') || '72')));
}

// pixels per second = (BPM/60) * PX_PER_QUARTER
function getSpeed() {
  return (getBPM() / 60) * PX_PER_QUARTER;
}

function resize() {
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
}
window.addEventListener('resize', resize);

// ── draw one frame ──
function draw(ts) {
  if (lastTs !== null && playing) {
    const dt = Math.min(ts - lastTs, 50);
    scrollX += getSpeed() * (dt / 1000);
  }
  lastTs = ts;

  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  const dpr = devicePixelRatio;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (!scoreData) { raf = requestAnimationFrame(draw); return; }

  const { notes, divisions, measureStartTicks, totalTicks } = scoreData;

  // staff vertical center
  const staffTop = H / 2 - STAFF_HEIGHT / 2 - LINE_SPACING;
  const staffBottom = staffTop + STAFF_HEIGHT;
  const midLineY = staffTop + 2 * LINE_SPACING; // 3rd line from top

  // cursor x position (where the "now" line is)
  const cursorX = W * 0.22;

  // ticks per px
  const tpp = 1 / PX_PER_QUARTER * divisions; // ticks per px = divisions / PX_PER_QUARTER... wait:
  // scrollX px = elapsed time * speed. At scrollX, the tick shown at cursorX is:
  // currentTick = scrollX * (divisions / PX_PER_QUARTER)
  const pxPerTick = PX_PER_QUARTER / divisions;

  // ── STAFF LINES ──
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1;
  for (let i = 0; i < STAFF_LINES; i++) {
    const y = staffTop + i * LINE_SPACING;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // ── CURSOR LINE ──
  ctx.strokeStyle = 'rgba(255,30,60,0.6)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(cursorX, staffTop - 24); ctx.lineTo(cursorX, staffBottom + 24); ctx.stroke();
  ctx.setLineDash([]);

  // ── BARLINES ──
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 1;
  measureStartTicks.forEach((tick, i) => {
    const x = cursorX + (tick * pxPerTick) - scrollX;
    if (x < -2 || x > W + 2) return;
    ctx.beginPath(); ctx.moveTo(x, staffTop); ctx.lineTo(x, staffBottom); ctx.stroke();

    // bar number
    if (x > 20 && x < W - 20) {
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.font = '10px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText(i + 1, x, staffTop - 8);
    }
  });

  // ── current bar for HUD ──
  {
    const curTick = scrollX / pxPerTick;
    let bar = 1;
    for (let i = 0; i < measureStartTicks.length; i++) {
      if (measureStartTicks[i] <= curTick) bar = i + 1;
    }
    currentBar = bar;
    document.getElementById('hud-pos').textContent = `BAR ${bar} / ${measureStartTicks.length}`;
  }

  // ── NOTES ──
  notes.forEach(note => {
    const x = cursorX + (note.tick * pxPerTick) - scrollX;
    if (x < -60 || x > W + 60) return;

    // y position: semitones from middle line midi
    const semiDiff = MIDDLE_LINE_MIDI - note.midi;
    const y = midLineY + semiDiff * (LINE_SPACING / 2);

    // ledger lines
    drawLedgerLines(x, y, staffTop, staffBottom);

    // note head
    const isPast = x < cursorX;
    ctx.fillStyle = isPast ? 'rgba(255,255,255,0.25)' : '#fff';
    ctx.strokeStyle = isPast ? 'rgba(255,255,255,0.25)' : '#fff';

    // filled oval
    ctx.beginPath();
    ctx.ellipse(x, y, HEAD_R * 1.3, HEAD_R, -0.2, 0, Math.PI * 2);
    ctx.fill();

    // stem (up if midi < B4=71, down if >= 71, roughly)
    if (note.dur > 0) {
      const stemUp = note.midi < 71;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      if (stemUp) {
        ctx.moveTo(x + HEAD_R * 1.2, y);
        ctx.lineTo(x + HEAD_R * 1.2, y - STEM_H);
      } else {
        ctx.moveTo(x - HEAD_R * 1.2, y);
        ctx.lineTo(x - HEAD_R * 1.2, y + STEM_H);
      }
      ctx.stroke();
    }

    // accidental
    if (note.alter !== 0) {
      ctx.fillStyle = isPast ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.85)';
      ctx.font = `${LINE_SPACING * 1.4}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const acc = note.alter > 0 ? '♯' : '♭';
      ctx.fillText(acc, x - HEAD_R * 2.4, y);
    }
  });

  // ── TREBLE CLEF (fixed left) ──
  drawTrebleClef(ctx, 14, staffTop, LINE_SPACING);

  // BPM display
  document.getElementById('hud-bpm-val').textContent = getBPM();

  raf = requestAnimationFrame(draw);
}

function drawLedgerLines(x, y, staffTop, staffBottom) {
  const tol = LINE_SPACING * 0.1;
  // above staff
  let ly = staffTop - LINE_SPACING;
  while (ly >= y - tol) {
    if (Math.abs(ly - y) < LINE_SPACING * 0.6) {
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - HEAD_R * 2, ly);
      ctx.lineTo(x + HEAD_R * 2, ly);
      ctx.stroke();
    }
    ly -= LINE_SPACING;
  }
  // below staff
  ly = staffBottom + LINE_SPACING;
  while (ly <= y + tol) {
    if (Math.abs(ly - y) < LINE_SPACING * 0.6) {
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x - HEAD_R * 2, ly);
      ctx.lineTo(x + HEAD_R * 2, ly);
      ctx.stroke();
    }
    ly += LINE_SPACING;
  }
}

// Simple treble clef drawn with canvas paths
function drawTrebleClef(ctx, x, staffTop, ls) {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 1.8;
  ctx.font = `${ls * 6.5}px serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  // Unicode treble clef glyph — renders well in serif
  ctx.fillText('𝄞', x, staffTop + ls * 4.2);
  ctx.restore();
}

// ═══════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════

function togglePlay() {
  playing = !playing;
  lastTs = null;
  document.getElementById('play-btn').textContent = playing ? '⏸ PAUSE' : '▶ PLAY';
}

function resetScroll() {
  scrollX = 0;
  playing = false;
  lastTs = null;
  document.getElementById('play-btn').textContent = '▶ PLAY';
}

function reloadFile() {
  scoreData = null;
  scrollX = 0;
  playing = false;
  lastTs = null;
  document.getElementById('play-btn').textContent = '▶ PLAY';
  document.getElementById('score-view').classList.remove('visible');
  document.getElementById('drop-zone').classList.remove('hidden');
}

function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen && document.exitFullscreen();
  }
}

function showError(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

// ═══════════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════════

async function loadFile(file) {
  try {
    let text;
    if (file.name.endsWith('.mxl')) {
      // .mxl is a ZIP — use JSZip to extract
      showError('MXL (compressed) format: please export as uncompressed .xml from your notation app.');
      return;
    } else {
      text = await file.text();
    }
    const data = parseMusicXML(text);
    if (data.notes.length === 0) throw new Error('No notes found');
    scoreData = data;
    scrollX = 0;
    playing = false;
    document.getElementById('drop-zone').classList.add('hidden');
    document.getElementById('score-view').classList.add('visible');
    resize();
  } catch (e) {
    showError('Parse error: ' + e.message);
    console.error(e);
  }
}

// drag and drop
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) loadFile(file);
});

// keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); if (scoreData) togglePlay(); }
  if (e.code === 'KeyR') resetScroll();
  if (e.code === 'KeyF') toggleFS();
});

// start render loop
resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
