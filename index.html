let audioCtx=null, clickBuf=null;

// ── Web Audio lookahead scheduler — works in background tabs ──
let nextBeatTime = 0;     // audioCtx time of next scheduled beat
let schedulerRunning = false;

async function initAudio(){
  if(audioCtx) return;
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const bin=atob(CLICK_B64);
    const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    clickBuf = await audioCtx.decodeAudioData(arr.buffer);
    startScheduler();
  }catch(e){console.warn('audio init failed',e);}
}

function scheduleClick(time){
  if(!audioCtx||!clickBuf) return;
  const snd=localStorage.getItem('pulse_sound');
  if(snd==='0') return;
  const paused=localStorage.getItem('metronome_paused')==='1';
  if(paused) return;
  const vol=parseFloat(localStorage.getItem('pulse_volume')||'80')/100;
  const src=audioCtx.createBufferSource();
  src.buffer=clickBuf;
  const g=audioCtx.createGain();
  g.gain.value=vol;
  src.connect(g);g.connect(audioCtx.destination);
  src.start(time);
}

function startScheduler(){
  if(schedulerRunning) return;
  schedulerRunning=true;
  nextBeatTime = audioCtx.currentTime + 0.1;
  // Schedule beats 100ms ahead, run every 25ms — survives background tabs
  setInterval(()=>{
    if(!audioCtx||!clickBuf) return;
    const snd=localStorage.getItem('pulse_sound');
    const paused=localStorage.getItem('metronome_paused')==='1';
    if(snd==='0'||paused){
      // Keep nextBeatTime current so we don't burst when resuming
      nextBeatTime=audioCtx.currentTime+0.1;
      return;
    }
    const bpm=getBPM();
    const beatInterval=60/bpm;
    const lookAhead=0.15;
    while(nextBeatTime < audioCtx.currentTime + lookAhead){
      scheduleClick(nextBeatTime);
      nextBeatTime += beatInterval;
    }
  }, 25);
}

document.addEventListener('click',initAudio,{once:true});
document.addEventListener('keydown',initAudio,{once:true});
document.addEventListener('touchstart',initAudio,{once:true});

function getBPM(){return Math.min(220,Math.max(20,parseInt(localStorage.getItem('pulse_bpm')||'72')));}

function toggleFS(){
  if(!document.fullscreenElement){
    (document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen||function(){}).call(document.documentElement);
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);
  }
}

const canvas=document.getElementById('ecg');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=canvas.offsetWidth*devicePixelRatio;
  canvas.height=canvas.offsetHeight*devicePixelRatio;
}
window.addEventListener('resize',resize);
resize();

function ecgY(t){
  t=((t%1)+1)%1;
  if(t<0.09)  return 0.12*Math.sin(t/0.09*Math.PI);
  if(t<0.18)  return 0;
  if(t<0.21)  return -0.15*Math.sin((t-0.18)/0.03*Math.PI);
  if(t<0.24)  return 1.0*Math.sin((t-0.21)/0.03*Math.PI);
  if(t<0.28)  return -0.25*Math.sin((t-0.24)/0.04*Math.PI);
  if(t<0.38)  return 0;
  if(t<0.55)  return 0.38*Math.sin((t-0.38)/0.17*Math.PI);
  return 0;
}

let offset=0, lastTs=null;

function draw(ts){
  if(lastTs===null) lastTs=ts;
  const dt=Math.min(ts-lastTs,50);
  lastTs=ts;

  const bpm=getBPM();
  const W=canvas.offsetWidth, H=canvas.offsetHeight;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.fillRect(0,0,W,H);

  const cycleMs=60000/bpm;
  const speed=W/(cycleMs*2.2);
  const pxPerCycle=speed*cycleMs;
  offset+=speed*dt;

  // beat trigger removed — audio handled by Web Audio scheduler

  const mid=H*0.5, amp=H*0.32;

  // glow
  ctx.beginPath();ctx.lineWidth=7;
  ctx.strokeStyle='rgba(255,30,60,0.09)';
  ctx.lineJoin='round';ctx.lineCap='round';
  let s=false;
  for(let px=0;px<W;px+=2){
    const y=mid-ecgY((offset-(W-px))/pxPerCycle)*amp;
    s?(ctx.lineTo(px,y)):(ctx.moveTo(px,y),s=true);
  }
  ctx.stroke();

  // line
  ctx.beginPath();ctx.lineWidth=2;
  ctx.strokeStyle='#ff1e3c';ctx.shadowColor='#ff1e3c';ctx.shadowBlur=10;
  ctx.lineJoin='round';ctx.lineCap='round';
  s=false;
  for(let px=0;px<W;px+=2){
    const y=mid-ecgY((offset-(W-px))/pxPerCycle)*amp;
    s?(ctx.lineTo(px,y)):(ctx.moveTo(px,y),s=true);
  }
  ctx.stroke();ctx.shadowBlur=0;

  // dot
  const hy=mid-ecgY(offset/pxPerCycle)*amp;
  ctx.beginPath();ctx.arc(W-2,hy,3.5,0,Math.PI*2);
  ctx.fillStyle='#ff1e3c';ctx.shadowColor='#ff1e3c';ctx.shadowBlur=18;
  ctx.fill();ctx.shadowBlur=0;

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>
